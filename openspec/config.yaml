schema: spec-driven

# Project context - AI reads this when creating artifacts
context: |
  Project: TicketFlow - 工单流程处理工具
  Tech stack: TypeScript full-stack (React + Hono + Drizzle + SQLite)
  Monorepo: pnpm workspaces (apps/web, apps/server, packages/shared)
  Auth: simple username/password
  Database: SQLite (better-sqlite3)
  ORM: Drizzle ORM
  Frontend: React 18 + Vite 5
  Backend: Hono
  Testing: Vitest
  Linting: ESLint + Prettier

  Directory Conventions (目录约定):
    项目采用 pnpm monorepo，每个 workspace 有明确职责边界。
    新增文件必须放入对应 workspace，禁止在根目录直接创建业务代码。

    apps/web/          — 前端 React 应用
      src/             — 页面组件、hooks、样式
      src/__tests__/   — 前端单元测试
      public/          — 静态资源

    apps/server/       — 后端 Hono API 服务
      src/routes/      — API 路由（每个资源一个文件，如 tickets.ts）
      src/db/          — 数据库连接、Drizzle schema、迁移
      src/__tests__/   — 后端单元测试
      src/middleware/   — Hono 中间件（如有）

    packages/shared/   — 前后端共享类型
      src/             — 类型定义、常量、工具函数
      src/__tests__/   — 共享包测试

    根目录              — 仅放配置文件（package.json, tsconfig, eslint, prettier 等）
    openspec/          — 规范文档，禁止放代码

  Coding Conventions (编码约定):
    - 测试文件放 src/__tests__/ 目录，与源文件同 workspace
    - 新增路由必须在 apps/server/src/app.ts 中挂载
    - 共享类型变更流程: 先改 packages/shared → 再改消费方 (web/server)
    - 环境变量通过 .env 管理，新增变量必须同步更新 .env.example
    - 新增 npm 依赖必须作为显式 task 偿明，不可隐含在其他 task 中
    - 数据库可移植约束: DB 相关代码（驱动、连接、pragma）必须收敛在 apps/server/src/db/ 目录内，禁止在路由/业务层直接引用数据库驱动或 SQLite 专属 API，确保 SQLite ↔ PostgreSQL 切换仅涉及 db/ 目录和 package.json
    - 禁止原始 SQL: 全项目禁止手写 SQL 语句（包括测试文件中的 DELETE/FROM 等），所有数据库操作必须通过 Drizzle ORM API 完成，确保可移植性
    - 命名一致性: DB 列名统一 snake_case，JS/TS 属性名统一 camelCase，artifacts 中涉及字段名时必须明确标注映射关系（如 "created_by → createdBy"），禁止混用
    - API spec 完整性: 每个 API 端点在 spec 中必须覆盖三种场景：成功响应、输入校验失败（400）、资源不存在（404）
    - API 错误格式统一: 所有 API 错误响应统一使用 `{ error: string }` 格式
    - 测试隔离: 涉及数据库的测试必须在 beforeEach 中通过 ORM API 清空数据，确保测试间互不污染

  Requirement ID 编码规则:
    格式: {CAP}-{SEQ} (如 PS-001, BE-002)
    CAP = capability 缩写 (2-3 大写字母)
    SEQ = 三位数字序号, 同 capability 内递增

  Capability 编码表:
    PS  = project-structure
    FE  = frontend-env
    BE  = backend-env
    ST  = shared-types
    DT  = dev-tooling
    TKT = ticket
    WF  = workflow
    UA  = user-auth

  Spec 编写约定:
    - 每个 Requirement 必须带 ID: ### Requirement: {CAP}-{SEQ} {名称}
    - Scenario 使用 WHEN/THEN 格式
    - 使用 SHALL/MUST 表达强制性需求
    - tasks.md 中任务应标注关联 Requirement ID: [CAP-SEQ]

  Change 命名规则:
    - kebab-case 格式
    - 功能类直接描述, 基建类可加 setup- 前缀, 修复类可加 fix- 前缀

# Per-artifact rules
rules:
  proposal:
    - Capabilities 使用 kebab-case 命名
    - 每个 capability 必须在编码表中注册缩写
    - 必须包含成功标准 (Success Criteria)：列出可验证的完成条件
    - Impact 必须列出具体的文件/目录变更，不使用模糊描述如"完整脚手架"
    - proposal 声明的 capability 必须与 specs 目录一一对应
  design:
    - 必须包含目录树 (Directory Layout)，展示关键文件和目录结构
    - 每个技术决策必须在对应的 spec 中有 Requirement 覆盖
    - 必须包含配置管理策略（环境变量、端口、路径等配置项如何管理）
    - 前后端分离架构必须说明开发代理 (dev proxy) 策略
    - Open Questions 不允许写"无"——至少列出 2 个待确认的假设或风险
    - 所有 artifact 中的示例值必须一致（如类型名、端口号、路径）
    - design 中的每个决策必须在 spec 中有对应 Requirement
    - 涉及数据库的 change 必须明确测试数据库策略（隔离方式、清空方式）
    - DB 相关字段名必须明确标注 DB 列名 ↔ JS 属性名映射关系
  specs:
    - 所有 Requirement 必须带 {CAP}-{SEQ} 编码
    - 每个 Requirement 至少有一个 Scenario
    - Scenario 必须使用 #### 级别标题
    - SHALL 语句必须具体可验证：包含具体的值、路径、端口、格式
    - 禁止使用"或类似工具"等模糊表述，必须指定具体技术
    - 所有 artifact 中的示例值必须一致（如类型名、端口号、路径）
    - 每个 Scenario 必须可自动化验证或可通过明确步骤手动验证
    - spec 中的每个 Requirement 必须有至少一个 task 实现它
  tasks:
    - 任务描述末尾标注关联 Requirement ID
    - 任务粒度控制在单个会话可完成
    - 必须声明任务间依赖（当任务 A 依赖任务 B 的产出时）
    - 每个 task group 必须可独立验证完成
    - 所有 spec Requirement 必须有对应 task 覆盖（正向追溯）
    - 安装依赖必须作为显式 task，不允许隐含在其他 task 中
    - tasks.md 中的验证步骤必须映射到 spec 中的 Scenario
